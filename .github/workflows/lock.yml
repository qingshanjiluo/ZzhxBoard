name: 自动生成并提交 package-lock.json

on:
  push:
    paths:
      - 'package.json'
  workflow_dispatch:

jobs:
  generate-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写入权限才能推送
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 检出完整的提交历史，便于后续提交
          fetch-depth: 0
          # 使用 GitHub token 进行身份验证（自动处理）
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 生成 package-lock.json
        run: |
          echo "📦 生成 package-lock.json ..."
          npm install --package-lock-only
          echo "✅ 生成完成"

      - name: 检查 lock 文件是否有变化
        id: check
        run: |
          if git diff --quiet package-lock.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📝 package-lock.json 无变化"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🔒 package-lock.json 已更新"
          fi

      - name: 提交并推送 package-lock.json
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: 自动生成 package-lock.json [skip ci]"
          git push
