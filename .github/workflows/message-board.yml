name: 最中幻想Board - 留言板服务

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reset_db:
        description: '重置数据库 (true/false)'
        required: false
        default: 'false'

jobs:
  message-board:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6小时
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: 安装依赖
        run: |
          # 如果没有package-lock.json，先创建
          if [ ! -f package-lock.json ]; then
            echo "📦 生成 package-lock.json..."
            npm install --package-lock-only
          fi
          npm ci || npm install
      
      - name: 下载上次留言数据
        id: download-data
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: message-board-data
          path: ./data/
      
      - name: 初始化数据库
        run: |
          mkdir -p ./data
          if [ "${{ github.event.inputs.reset_db }}" = "true" ] || [ ! -f "./data/messages.db" ]; then
            echo "🔄 初始化新数据库"
            node scripts/init-db.js
          else
            echo "✅ 使用已有数据库"
          fi
      
      - name: 启动留言板服务
        run: |
          npm start &
          sleep 5
          # 等待服务启动
          for i in {1..10}; do
            if curl -s http://localhost:3000/health > /dev/null; then
              echo "✅ 服务启动成功"
              break
            fi
            echo "⏳ 等待服务启动... ($i/10)"
            sleep 2
          done
      
      - name: 安装bore内网穿透
        run: |
          wget -q https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          sudo mv bore /usr/local/bin/
          rm bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
      
      - name: 暴露公网地址
        id: bore
        run: |
          bore local 3000 --to bore.pub 2>&1 | tee bore.log &
          sleep 10
          
          PORT=$(grep -oP 'listening at bore\.pub:\K\d+' bore.log | head -1)
          if [ -z "$PORT" ]; then
            echo "⚠️ 未获取到端口，尝试备用方案..."
            PORT=$(grep -oP 'bore\.pub:\K\d+' bore.log | head -1)
          fi
          
          if [ -z "$PORT" ]; then
            echo "❌ 获取隧道端口失败，日志内容:"
            cat bore.log
            # 继续运行，不退出
            echo "public_url=http://bore.pub:unknown" >> $GITHUB_OUTPUT
            echo "unknown" > public-url.txt
          else
            PUBLIC_URL="http://bore.pub:$PORT"
            echo "✅ 公网访问地址: $PUBLIC_URL"
            echo "public_url=$PUBLIC_URL" >> $GITHUB_OUTPUT
            echo "$PUBLIC_URL" > public-url.txt
          fi
      
      - name: 保存公网地址
        uses: actions/upload-artifact@v4
        with:
          name: bore-tunnel-url
          path: public-url.txt
          retention-days: 1
      
      - name: 显示服务信息
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "🎉 最中幻想Board 已启动！"
          echo "═══════════════════════════════════════════════════════════"
          echo "📍 本地访问: http://localhost:3000"
          echo "🌐 公网访问: ${{ steps.bore.outputs.public_url }}"
          echo "🔐 管理员密码: ${{ secrets.ADMIN_PASSWORD }}"
          echo "💾 数据保存路径: ./data/messages.db"
          echo "═══════════════════════════════════════════════════════════"
          echo "⏰ 服务将运行6小时"
          echo "📊 查看留言: ${{ steps.bore.outputs.public_url }}"
          echo "🔧 健康检查: ${{ steps.bore.outputs.public_url }}/health"
          echo "═══════════════════════════════════════════════════════════"
      
      - name: 保持运行
        run: |
          # 创建一个简单的保活脚本
          while true; do
            sleep 3600
            echo "🕐 服务仍在运行 - $(date)"
            curl -s http://localhost:3000/health > /dev/null && echo "✅ 健康检查通过" || echo "⚠️ 健康检查失败"
          done
      
      - name: 保存留言数据
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: message-board-data
          path: ./data/messages.db
          retention-days: 90
      
      - name: 清理临时文件
        if: always()
        run: |
          echo "🧹 清理临时文件..."
          rm -f bore.log public-url.txt 2>/dev/null || true
