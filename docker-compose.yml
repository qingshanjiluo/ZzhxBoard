version: '3.8'

services:
  message-board:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-most_wish_board_secret_key_2024}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - DATABASE_URL=/app/data/messages.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
